<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التربية الوطنية - 100 سؤال</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
        }
        .quiz-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }
        h1 {
            font-size: 26px;
            color: #34495e;
            margin: 0 0 10px;
        }
        .progress {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: bold;
        }
        h2 {
            margin: 0 0 25px;
            font-size: 22px;
            line-height: 1.6;
            color: #1a252f;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .options-list li {
            background-color: #f8f9fa;
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-size: 18px;
            border: 2px solid transparent;
        }
        .options-list li:hover {
            background-color: #e9ecef;
            transform: translateX(-5px);
        }
        .options-list li.selected {
            border-color: #3498db;
            background-color: #e1f0fa;
        }
        .options-list li.correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
        }
        .options-list li.wrong {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b;
        }
        .btn {
            background-color: #2c3e50;
            color: #fff;
            border: none;
            display: block;
            width: 100%;
            cursor: pointer;
            font-size: 1.2rem;
            font-family: inherit;
            padding: 18px;
            margin-top: 25px;
            border-radius: 8px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #1a252f;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .score-section {
            text-align: center;
        }
        .score-section h2 {
            font-size: 32px;
            color: #27ae60;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div class="quiz-header">
        <h1>اختبار التربية الوطنية الشامل</h1>
        <div class="progress" id="progress">السؤال 1 من 100</div>
    </div>
    
    <h2 id="question">جاري تحميل السؤال...</h2>
    
    <ul class="options-list" id="options"></ul>

    <button class="btn" id="submitBtn" disabled>تأكيد الإجابة</button>
</div>

<script>
    // البيانات الخام: 100 سؤال وجواب
    const rawData = [
      ["ما هو تعريف التربية الوطنية؟", "عملية تهدف إلى إعداد المواطن الصالح ليكون مشاركاً فاعلاً في مجتمعه."],
      ["التربية الوطنية تهدف لتنشئة الفرد على مجموعة من المعارف والقيم التي تجعله قادراً على خدمة مجتمعه وتطويره و________.", "الدفاع عنه."],
      ["ما هي أقسام التربية الوطنية؟", "التربية السياسية والتربية الخلقية."],
      ["أي نوع من التربية يهدف لتعليم الثقافة السياسية وأسس نظام الحكم؟", "التربية السياسية."],
      ["التربية التي ترسم حداً فاصلاً بين السلوك المرغوب وغير المرغوب هي:", "التربية الخلقية."],
      ["ما هو تعريف الانتماء لغةً؟", "من النماء والزيادة والارتفاع والعلو."],
      ["ماذا يعني الانتساب والارتباط الصادق للوطن فكراً وقولاً؟", "الانتماء اصطلاحاً."],
      ["بم يرتبط الانتماء؟", "بالوطن أو الأرض."],
      ["ما هو تعريف الولاء لغةً؟", "الدنو والقرب والمناصرة والتأييد."],
      ["الشعور الداخلي أو الخارجي الذي يدفع الإنسان للإخلاص لأولي الأمر هو:", "الولاء اصطلاحاً."],
      ["كيف يتحقق الولاء في الأردن؟", "بالالتزام بالدستور والقوانين وطاعة ولي الأمر وتأييد القيادة الهاشمية."],
      ["ماذا تعني المصلحة الوطنية؟", "أهداف الدولة وطموحاتها سواء اقتصادية أو عسكرية أو ثقافية."],
      ["من هو الموجه الأساسي لصانع القرار؟", "المصلحة الوطنية."],
      ["إلى كم قسم تنقسم المصلحة الوطنية؟", "قسمين: عليا ودنيا."],
      ["اذكر أمثلة على المصلحة الوطنية العليا.", "الأمن والبقاء والهيبة والنمو الاقتصادي."],
      ["ما هي المصلحة التي تتضمن توفير فرص العمل والتعليم؟", "المصلحة الوطنية الدنيا."],
      ["يسعى الأردن لتحقيق مصالحه ضمن أطر عربية من خلال تقوية علاقته بـ:", "الجامعة العربية."],
      ["كيف يحقق الأردن مصالحه في الإطار الإسلامي؟", "بعضويته في منظمة التعاون الإسلامي."],
      ["من أهم المصالح الوطنية الأردنية حماية الوطن والدستور و:", "حفظ الوحدة الوطنية."],
      ["ما هي الهوية الوطنية؟", "مجموعة من السمات والخصائص التي تميز أبناء وطن معين."],
      ["بم ترتبط الهوية الوطنية؟", "بمكونات الوطن الفكرية والمادية من لغة وعادات وتقاليد."],
      ["في الديمقراطية، من هو مصدر السلطة؟", "الشعب."],
      ["ماذا تمثل المشاركة السياسية في الديمقراطية؟", "جوهر الديمقراطية."],
      ["ما هو النظام السياسي؟", "نسق من العمليات والتفاعلات تشمل علاقة سلطة بين النخبة الحاكمة والمواطنين."],
      ["من وظائف النظام السياسي أنه آلية لـ:", "حل الخلافات وإقرار القوانين."],
      ["من مقومات الدولة التأسيسية: الشعب، الأرض، و________.", "الحكومة."],
      ["ما هي العناصر الإضافية للدولة؟", "السيادة والاعتراف."],
      ["ما هو القانون الأسمى في الدولة؟", "الدستور."],
      ["ماذا ينظم الدستور؟", "علاقة الدولة بالأفراد من حيث الحقوق والواجبات."],
      ["ما هي التنمية السياسية؟", "تطوير النظم السياسية لجعلها أقدر على الاستجابة للتحديات."],
      ["من مؤشرات التنمية السياسية الانتقال السلمي للسلطة و:", "احترام الدستور والقانون."],
      ["من أي سلطة يصدر القانون؟", "السلطة التشريعية."],
      ["النظام يصدر عن السلطة التنفيذية بهدف:", "تطبيق أحكام القانون وتفصيله."],
      ["من يقر الأنظمة قبل نشرها في الجريدة الرسمية؟", "مجلس الوزراء بعد صياغتها من ديوان التشريع والرأي."],
      ["كم عدد الأوراق النقاشية التي تمثل الرؤية الأردنية لمفهوم الديمقراطية في الملخص؟", "الخمسة الأولى."],
      ["متى نشرت الورقة النقاشية الأولى؟", "29 كانون الأول 2012."],
      ["ما هو عنوان الورقة النقاشية الأولى؟", "مسيرتنا نحو بناء الديمقراطية المتجددة."],
      ["مع ماذا تزامن إصدار الورقة النقاشية الأولى؟", "مع وجود انتخابات نيابية."],
      ["حسب الورقة الأولى، أساس الشراكة بين الجميع هو:", "احترام الرأي الآخر."],
      ["المواطنة لا تكتمل إلا بممارسة واجب:", "المساءلة."],
      ["ماذا تعني الديمقراطية بالنسبة للرابح والخاسر حسب الورقة الأولى؟", "لا تعني وجود رابح وخاسر، بل الجميع شركاء."],
      ["ما عنوان الورقة النقاشية الثانية؟", "تطوير نظامنا الديمقراطي لخدمة جميع الأردنيين."],
      ["متى نشرت الورقة الثانية؟", "16 كانون الثاني 2013."],
      ["في أي ورقة نوقش الانتقال إلى الحكومات البرلمانية والحاجة لأحزاب فاعلة؟", "الورقة النقاشية الثانية."],
      ["متى نشرت الورقة النقاشية الثالثة؟", "2 آذار 2013."],
      ["ما هو دور الأحزاب السياسية حسب الورقة الثالثة؟", "تحويل ما ينادي به الأفراد إلى خطط عمل مشتركة."],
      ["من أدوار النائب التوازن بين مسؤولية التعاون ومسؤولية:", "المعارضة البناءة."],
      ["ما هو دور الملكية حسب الورقة الثالثة؟", "الدفاع عن القضايا المصيرية وأمننا القومي وحماية تاريخنا الديني."],
      ["متى صدرت الورقة النقاشية الرابعة؟", "2 حزيران 2013."],
      ["ما هو الهدف الرئيسي من الإصلاح في الورقة الرابعة؟", "تعزيز المشاركة الشعبية في صنع القرار."],
      ["متى نشرت الورقة النقاشية الخامسة؟", "13 تشرين الأول 2014."],
      ["من الانجازات التشريعية إقرار تعديلات دستورية ترسخ مبادئ:", "الفصل والتوازن بين السلطات."],
      ["ما هي الهيئة التي استحدثت كإنجاز مؤسسي للانتخابات؟", "هيئة مستقلة للانتخاب."],
      ["من الممارسات الديمقراطية في الورقة الخامسة التلازم بين حقوق المواطنين و:", "واجباتهم."],
      ["المشاركة السياسية قد تكون سلمية ديمقراطية مثل:", "التصويت وعقد الندوات."],
      ["وقد تكون المشاركة غير سلمية مثل:", "التمرد والعصيان المدني."],
      ["ما هي الأسس الثلاثة للمواطنة الفاعلة؟", "حق المشاركة، واجب المشاركة، مسؤولية المشاركة."],
      ["هل يمكن قيام ديمقراطية بدون أحزاب سياسية؟", "لا ديمقراطية بدون أحزاب."],
      ["بموجب أي قانون عرف الحزب السياسي عام 2015؟", "قانون الأحزاب الأردني رقم 39 لعام 2015."],
      ["هل يجوز تأسيس حزب على أساس ديني أو طائفي؟", "لا يجوز."],
      ["متى برز مفهوم المواطنة عالمياً؟", "بعد معاهدة وستفاليا عام 1648."],
      ["ما هي المواطنة؟", "العقد الذي يربط بين فرد ودولة ويتضمن حقوقاً وواجبات."],
      ["اذكر إحدى سمات المواطن الصالح.", "احترام الدستور والقوانين ومعرفة حقوقه وواجباته."],
      ["ما هي الحقوق السياسية؟", "المشاركة في الاقتراع والترشح في الانتخابات."],
      ["حق الملكية الخاصة وحق العمل والتنظيم النقابي من أي حقوق؟", "الحقوق الاقتصادية."],
      ["من طرح مبدأ حق تقرير المصير عام 1918؟", "الرئيس الأمريكي وودرو ويلسون."],
      ["الواجبات التي تتمثل بالالتزام بالقانون تسمى:", "واجبات قانونية."],
      ["المادة 6 من الدستور تنص على أن الأردنيين أمام القانون:", "سواء لا تمييز بينهم في الحقوق والواجبات."],
      ["الدفاع عن الوطن وأرضه ووحدة شعبه حسب المادة 6 يعتبر:", "واجب مقدس على كل أردني."],
      ["هل يجوز إبعاد أردني من ديار المملكة حسب المادة 9؟", "لا يجوز إبعاد أردني من ديار المملكة."],
      ["التعليم الأساسي للأردنيين حسب المادة 20 هو:", "إلزامي ومجاني في مدارس الحكومة."],
      ["متى احتل الأردن المرتبة الأولى عربياً في مؤشر حقوق الإنسان؟", "عام 2015."],
      ["ما هو نقيض الظلم ويعني الإنصاف؟", "العدالة."],
      ["من الذي ينطلق من إثبات تفوق الأنا في الحوار؟", "الجدال."],
      ["متى تأسست منظمة الأمم المتحدة؟", "عام 1945."],
      ["ما هي الدولة المدنية حسب وصف جلالة الملك في الورقة السادسة؟", "دولة تحتكم إلى الدستور والقوانين وتفصل بين السلطات."],
      ["ماذا تعني كلمة الأردن آرامياً؟", "الشدة والغلبة وشديد الانحدار."],
      ["مساحة المملكة الأردنية الهاشمية هي:", "89,297 كم2."],
      ["كم يبلغ طول الأغوار (حفرة الانهدام)؟", "660 كم."],
      ["ما هي أعلى قمة جبلية في الأردن؟", "قمة جبل أم الدامي (1854م)."],
      ["متى وقعت معركة اليرموك؟", "15 هجري / 636 ميلادي."],
      ["أين انطلق العهد العباسي؟", "من الحميمة جنوب الأردن."],
      ["متى انطلقت الثورة العربية الكبرى؟", "10 حزيران 1916."],
      ["متى بويع الشريف الحسين بالخلافة؟", "4 آذار 1924."],
      ["متى تم الاستقلال الإداري للأردن؟", "25 أيار 1923."],
      ["متى تم إعلان استقلال الأردن ومبايعة الملك عبد الله الأول؟", "25 أيار 1946."],
      ["من هو أول شهيد أردني في فلسطين عام 1920؟", "كايد مفلح عبيدات."],
      ["من هو قائد الكتيبة السادسة في معارك القدس عام 1948؟", "عبد الله التل."],
      ["ماذا سمى الملك عبد الله الأول الكتيبة الرابعة بقيادة حابس المجالي؟", "الكتيبة الرابحة."],
      ["متى حدثت وحدة الضفتين؟", "24 نيسان 1950."],
      ["متى استشهد الملك عبد الله الأول؟", "20 تموز 1951 في رحاب المسجد الأقصى."],
      ["الدستور الذي جعل الحكومة مسؤولة أمام السلطة التشريعية صدر عام:", "1952 في عهد الملك طلال."],
      ["متى تم تعريب قيادة الجيش الأردني؟", "1 آذار 1956."],
      ["متى وقعت معركة الكرامة؟", "21 آذار 1968."],
      ["متى صدر قرار فك الارتباط؟", "31 تموز 1988."],
      ["متى وقعت معاهدة السلام الأردنية الإسرائيلية (وادي عربة)؟", "عام 1994."],
      ["متى تسلم الملك عبد الله الثاني سلطاته الدستورية؟", "7 شباط 1999."],
      ["متى صدرت مبادرة الأردن أولاً؟", "30 تشرين الأول 2002."],
      ["متى صدرت رسالة عمان؟", "رمضان 1425 هجري / تشرين الثاني 2004."],
      ["أين تم إنجاز إعادة بناء منبر صلاح الدين الأيوبي في الإعمار الهاشمي الخامس؟", "في جامعة البلقاء التطبيقية عام 2007."]
    ];

    let quizData = [];
    
    // خوارزمية توليد الخيارات الخاطئة
    rawData.forEach((item, index) => {
        let question = item[0];
        let correct = item[1];
        let distractors = [];
        
        while(distractors.length < 3) {
            let randomIndex = Math.floor(Math.random() * rawData.length);
            if(randomIndex !== index && !distractors.includes(rawData[randomIndex][1])) {
                distractors.push(rawData[randomIndex][1]);
            }
        }
        
        let options = [correct, ...distractors];
        // خلط الخيارات
        options.sort(() => Math.random() - 0.5);
        
        quizData.push({
            question: question,
            options: options,
            correctAnswer: correct
        });
    });

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const submitBtn = document.getElementById('submitBtn');
    const progressEl = document.getElementById('progress');
    const quizEl = document.getElementById('quiz');

    let currentQuiz = 0;
    let score = 0;
    let selectedOptionText = null;
    let answered = false;

    function loadQuiz() {
        answered = false;
        selectedOptionText = null;
        submitBtn.innerText = 'تأكيد الإجابة';
        submitBtn.disabled = true;

        const currentQuizData = quizData[currentQuiz];
        progressEl.innerText = `السؤال ${currentQuiz + 1} من ${quizData.length}`;
        questionEl.innerText = currentQuizData.question;

        optionsEl.innerHTML = '';
        
        currentQuizData.options.forEach(option => {
            const li = document.createElement('li');
            li.innerText = option;
            li.addEventListener('click', () => selectOption(li, option));
            optionsEl.appendChild(li);
        });
    }

    function selectOption(li, optionText) {
        if (answered) return;
        
        const allOptions = optionsEl.querySelectorAll('li');
        allOptions.forEach(opt => opt.classList.remove('selected'));
        
        li.classList.add('selected');
        selectedOptionText = optionText;
        submitBtn.disabled = false;
    }

    submitBtn.addEventListener('click', () => {
        if (!answered) {
            checkAnswer();
        } else {
            currentQuiz++;
            if (currentQuiz < quizData.length) {
                loadQuiz();
            } else {
                showResults();
            }
        }
    });

    function checkAnswer() {
        answered = true;
        const currentQuizData = quizData[currentQuiz];
        const allOptions = optionsEl.querySelectorAll('li');
        
        allOptions.forEach(opt => {
            opt.classList.remove('selected');
            if (opt.innerText === currentQuizData.correctAnswer) {
                opt.classList.add('correct');
            } else if (opt.innerText === selectedOptionText) {
                opt.classList.add('wrong');
            }
        });

        if (selectedOptionText === currentQuizData.correctAnswer) {
            score++;
        }

        submitBtn.innerText = currentQuiz === quizData.length - 1 ? 'عرض النتيجة النهائية' : 'السؤال التالي';
    }

    function showResults() {
        let message = score >= 90 ? "أداء مبهر! دراستك ممتازة." : 
                      score >= 70 ? "أداء جيد، بس بتحتاج تراجع بعض التواريخ والمفاهيم." : 
                      "تحتاج تعيد دراسة الملخص بتركيز أكبر وبعيداً عن الحفظ الأعمى.";

        quizEl.innerHTML = `
            <div class="score-section">
                <h2>انتهى الاختبار!</h2>
                <p style="font-size: 24px; font-weight: bold;">نتيجتك: ${score} من ${quizData.length}</p>
                <p style="font-size: 18px; color: #7f8c8d;">${message}</p>
                <button class="btn" onclick="location.reload()">إعادة الاختبار</button>
            </div>
        `;
    }

    loadQuiz();
</script>

</body>
</html>
