    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-color: #c9d1d9;
            --primary-color: #238636;
            --primary-hover: #2ea043;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --error-color: #f85149;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
        }

        p.subtitle {
            font-size: 0.9em;
            color: #8b949e;
            margin: 0;
        }

        #quiz-section {
            display: none;
        }

        .question-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-label {
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-label:hover {
            border-color: var(--accent-color);
            background-color: #1f2428;
        }

        .option-label input[type="radio"] {
            margin-left: 15px;
            transform: scale(1.2);
            accent-color: var(--accent-color);
        }

        .btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #234b2f;
            cursor: not-allowed;
            color: #8b949e;
        }

        #result-section {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 3em;
            font-weight: bold;
            color: var(--accent-color);
            margin: 20px 0;
        }

        .progress-bar {
            background-color: var(--border-color);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8em;
            color: #484f58;
        }
        
        .loading {
            text-align: center;
            font-size: 1.2em;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>

        </header>

        <div id="quiz-section" style="display: block;">

            </div>
            
            <div class="question-title" id="question-title"></div>
            <div class="options-container" id="options-container">
            </div>

                <button class="btn" id="skip-btn" style="background-color: #21262d; border: 1px solid var(--border-color); color: #c9d1d9;">تخطي السؤال</button>
            </div>
        </div>

        <div id="result-section">
            <h2>اكتمل الاختبار!</h2>

            <p id="result-message"></p>
            <button class="btn" id="restart-btn" style="margin-top: 20px;">إعادة الاختبار بأسئلة مخربطة جديدة</button>
        </div>

        <div class="footer-note">
            تم التطوير بواسطة Ron | بيئة برمجية آمنة
        </div>
    </div>

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        function parseQuestions(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let parsed = [];
            let currentQ = null;
            let currentOptions = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                if (line.includes('--- PAGE') || line.includes('المحور')) {
                    continue;
                }

                let ansMatch = line.match(/^\)(\d+)\($/);
                if (ansMatch) {
                    if (currentQ) {
                        parsed.push({
                            question: currentQ,
                            options: currentOptions,
                            answerIndex: parseInt(ansMatch[1]) - 1 
                        });
                        currentQ = null;
                        currentOptions = [];
                    }
                    continue;
                }

                let qMatch = line.match(/^(\d+)\s*[\*\-]?\s*(.+)/);
                
                if (qMatch && !ansMatch) {
                    currentQ = qMatch[2]; 
                    currentOptions = [];
                    continue;
                }

                if (currentQ) {
                    currentOptions.push(line);
                }
            }
            return parsed;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        const quizSection = document.getElementById('quiz-section');
        const resultSection = document.getElementById('result-section');
        
        const questionTitle = document.getElementById('question-title');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const skipBtn = document.getElementById('skip-btn');
        const questionCounter = document.getElementById('question-counter');
        const scoreLive = document.getElementById('score-live');

        function initQuiz() {
            questions = parseQuestions(rawPdfText);
            shuffleArray(questions);
            
            questions.forEach(q => {
                let correctAnswerText = q.options[q.answerIndex];
                shuffleArray(q.options);
                q.answerIndex = q.options.indexOf(correctAnswerText);
            });

            currentQuestionIndex = 0;
            score = 0;
            
            resultSection.style.display = 'none';
            quizSection.style.display = 'block';
            
            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.disabled = true;
            let q = questions[currentQuestionIndex];
            
            questionCounter.textContent = `سؤال ${currentQuestionIndex + 1} من ${questions.length}`;
            scoreLive.textContent = `النتيجة: ${score}`;
            
            questionTitle.textContent = q.question;
            optionsContainer.innerHTML = '';

            q.options.forEach((optText, index) => {
                let label = document.createElement('label');
                label.className = 'option-label';
                
                let input = document.createElement('input');
                input.type = 'radio';
                input.name = 'option';
                input.value = index;
                
                input.addEventListener('change', () => {
                    nextBtn.disabled = false;
                });

                label.appendChild(input);
                label.appendChild(document.createTextNode(optText));
                optionsContainer.appendChild(label);
            });
        }

        nextBtn.addEventListener('click', () => {
            let selectedOption = document.querySelector('input[name="option"]:checked');
            if (!selectedOption) return;

            let selectedIndex = parseInt(selectedOption.value);
            let q = questions[currentQuestionIndex];

            if (selectedIndex === q.answerIndex) {
                score++;
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        // إضافة حدث الضغط لزر التخطي (ينتقل للسؤال التالي دون زيادة النتيجة)
        skipBtn.addEventListener('click', () => {
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizSection.style.display = 'none';
            resultSection.style.display = 'block';
            
            document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
            let percentage = (score / questions.length) * 100;
            let msg = document.getElementById('result-message');
            
            if (percentage >= 90) {
                msg.textContent = "أداء ممتاز! مستوى استيعابك للمادة عالي جداً.";
                msg.style.color = "#2ea043";
            } else if (percentage >= 70) {
                msg.textContent = "أداء جيد، ولكن يوجد مساحة للتحسين.";
                msg.style.color = "#58a6ff";
            } else {
                msg.textContent = "تحتاج لمراجعة المادة بشكل مكثف.";
                msg.style.color = "#f85149";
            }
        }

        document.getElementById('restart-btn').addEventListener('click', initQuiz);

        window.onload = initQuiz;

    </script>
